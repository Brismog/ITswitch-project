{% extends "base.html" %}

{% block title %}Home - ITswitch E-commerce{% endblock %}

{% block content %}
<div class="row">
    {% for item in items %}
    <div class="col-md-4 mb-4">
        <div class="card">
            <div class="card-body">
                <h5 class="card-title">{{ item.name }}</h5>
                <p class="card-text">{{ item.description }}</p>
                <p class="card-text"><strong>${{ "%.2f"|format(item.price) }}</strong></p>
                <a href="{{ url_for('item_detail', item_id=item.id) }}" class="btn btn-primary">View Details</a>
            </div>
        </div>
    </div>
    {% endfor %}
</div>
{% endblock %}
